<!doctype html><html lang="pt-BR"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<meta name="theme-color" content="#F6F1E7"/>
<title>Fichas Técnicas · Nutri & P&D — Bentô</title>
<style>
:root{--bg:#F6F1E7;--surface:#FFFDF7;--ink:#232619;--soft:#5E6353;--pist:#46583A;--border:#E4DCC9;--gold:#C9A24A;--red:#8A2A00;--warn:#7A5320}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 Georgia,'Times New Roman',serif}
.mono{font-family:ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;font-size:10px}
header{display:flex;gap:12px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
header h1{font-size:16px;margin:0}header .mono{color:var(--pist)}
main{display:grid;grid-template-columns:250px 1fr;gap:0;min-height:calc(100vh - 57px)}
nav{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto}
nav button{display:block;width:100%;text-align:left;padding:9px 14px;border:0;border-bottom:1px solid var(--border);background:none;cursor:pointer;font:inherit;font-size:13px}
nav button.on{background:var(--bg);font-weight:700}
nav .tag{font-size:9px;padding:1px 5px;border-radius:6px;margin-left:5px;font-family:ui-monospace,monospace}
.tag.draft{background:#F2E2C5;color:var(--warn)}.tag.est{background:#FBE3EC;color:#A8334A}
section{padding:18px 22px;max-width:980px}
h2{font-size:19px;margin:0 0 2px}h3{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--pist);margin:20px 0 8px;font-family:ui-monospace,monospace}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
label{display:block;font-size:10px;color:var(--soft);font-family:ui-monospace,monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
input,textarea{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:7px;background:#fff;font:inherit;font-size:13px}
textarea{min-height:74px;resize:vertical}
.row{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
button.act{padding:9px 14px;border:1px solid var(--pist);border-radius:8px;background:var(--pist);color:#fff;cursor:pointer;font:inherit;font-size:13px}
button.sec{background:none;color:var(--pist)}button.act:disabled{opacity:.5;cursor:wait}
.ficha{background:#fff;border:1.5px solid var(--ink);padding:18px;margin-top:8px}
.ficha h4{margin:0 0 4px;font-size:15px;text-transform:uppercase}
.ficha table{border-collapse:collapse;width:100%;max-width:460px;margin:8px 0}
.ficha th,.ficha td{border:1px solid var(--ink);padding:3px 8px;font-size:12.5px;text-align:right}
.ficha th:first-child,.ficha td:first-child{text-align:left}
.ficha .b{font-weight:700}.ficha p{margin:6px 0;font-size:12.5px}
.ai{border:1px solid var(--border);border-radius:9px;background:var(--surface);padding:14px;margin-top:10px}
.ai .critico{color:var(--red);font-weight:700}.ai .atencao{color:var(--warn);font-weight:700}.ai .info{color:var(--pist);font-weight:700}
.ai li{margin:6px 0;font-size:13px}
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9}
#gate>div{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:min(320px,calc(100vw - 32px));text-align:center}
.status{font-size:12px;color:var(--soft);min-height:18px}
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
@media (max-width:760px){
  main{display:block;min-height:auto}
  header{flex-wrap:wrap;padding:10px 14px;gap:6px 14px}
  header>.mono:first-child{display:none}
  header h1{flex:1 1 100%;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .hspace{display:none}
  header a.mono{font-size:9px;padding:4px 0}
  nav{display:flex;overflow-x:auto;overflow-y:hidden;border-right:0;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:2}
  nav button{flex:0 0 auto;width:auto;white-space:nowrap;border-bottom:0;border-right:1px solid var(--border);padding:10px 12px;min-height:44px}
  nav button.on{box-shadow:inset 0 -3px 0 var(--pist)}
  nav button>.mono{display:none!important}
  section{padding:14px 12px;max-width:none}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  input,textarea{font-size:16px}
  button.act{min-height:44px}
  .row button.act{flex:1 1 auto}
  .ficha{padding:12px}
  .ficha table{max-width:none;min-width:400px}
}
@media print{header,nav,.noprint,#gate{display:none!important}main{display:block}section{max-width:none;padding:0}.tablewrap{overflow:visible}.ficha{border-width:2px;page-break-inside:avoid}.ficha table{max-width:460px;min-width:0}}
</style></head><body>
<div id="gate"><div>
  <div class="mono" style="color:var(--pist);margin-bottom:10px">Bentô · Fichas Técnicas</div>
  <p style="font-size:13px;color:var(--soft)">Acesso exclusivo — nutricionista & P&D.</p>
  <input id="gkey" type="password" placeholder="Senha do painel de fichas" autocomplete="current-password"/>
  <input id="gname" type="text" placeholder="Seu nome (para o histórico)" style="margin-top:8px"/>
  <button class="act" id="gbtn" style="width:100%;margin-top:12px">Entrar</button>
  <div class="status" id="gerr"></div>
</div></div>

<header>
  <div class="mono">Bentô Functional Nutrition</div>
  <h1>Fichas Técnicas — Nutri & P&D</h1>
  <span class="hspace" style="flex:1"></span>
  <a class="mono noprint" href="/tabela-nutricional.csv" download style="color:var(--pist)">CSV nutricional</a>
  <a class="mono noprint" href="/ficha-tecnica.csv" download style="color:var(--pist)">CSV produção</a>
  <button class="act sec noprint" id="expjson" style="padding:6px 10px;font-size:12px">Exportar JSON</button>
</header>
<main>
  <nav id="nav"></nav>
  <section id="sec"><p class="status">Carregando…</p></section>
</main>
<script>
"use strict";
const $=(s)=>document.querySelector(s);
const VD={kcal:2000,carbs:300,addedSugars:50,protein:50,fat:65,satFat:20,fiber:25,sodium:2000};
const NUT=[["kcal","Valor energético (kcal)"],["carbs","Carboidratos (g)"],["sugars","Açúcares totais (g)"],["addedSugars","Açúcares adicionados (g)"],["protein","Proteínas (g)"],["fat","Gorduras totais (g)"],["satFat","Gorduras saturadas (g)"],["transFat","Gorduras trans (g)"],["fiber","Fibras alimentares (g)"],["sodium","Sódio (mg)"]];
let DATA=null,DRAFTS={},CUR=null,KEY=localStorage.getItem("fichas:key")||"",NAME=localStorage.getItem("fichas:nome")||"";
const br=(v)=>Number.isFinite(v)?String(Math.round(v*10)/10).replace(".",","):"—";
const auth=()=>({Authorization:"Bearer "+KEY,"Content-Type":"application/json"});

// ordem decrescente por quantidade; qty não numérica mantém a posição da receita
function ordered(ings){
  const g=(q)=>{const n=parseFloat(String(q).replace(/\./g,""));return Number.isFinite(n)?n:null};
  const all=ings.map((ing,i)=>({ing,i,g:g(ing.qty)}));
  const sorted=all.filter(x=>x.g!==null).sort((a,b)=>b.g-a.g||a.i-b.i);let k=0;
  return all.map(x=>x.g===null?x.ing:sorted[k++].ing);
}
function merged(p){
  const d=DRAFTS[p.id]||{};
  return {...p,...d,nutrition:{...p.nutrition,...(d.nutrition||{})},draft:Object.keys(d).filter(k=>k!=="_meta").length>0};
}
function rotuloIngredientes(m){
  if(m.ingredientesText) return m.ingredientesText;
  return ordered(m.ingredients).map(i=>i.note?`${i.name} (${i.note.toLowerCase()})`:i.name).join(", ")+".";
}
function alergicosTexto(m){
  const a=(m.alergicosText||m.allergens.join(", "));
  return a?`ALÉRGICOS: CONTÉM ${a.toUpperCase()}.`:"ALÉRGICOS: NÃO CONTÉM ALÉRGENOS DE DECLARAÇÃO OBRIGATÓRIA.";
}
function advertencias(m){
  const out=[];
  if(m.hasPolyols) out.push("CONTÉM POLIÓIS. "+DATA.avisoPoliol.toUpperCase());
  out.push(m.flags.gluten?"CONTÉM GLÚTEN.":"NÃO CONTÉM GLÚTEN.");
  out.push(m.flags.lactose?"CONTÉM LACTOSE.":"NÃO CONTÉM LACTOSE.");
  out.push(`ALÉRGICOS: PODE CONTER ${DATA.podeConter.join(", ")}.`);
  if(m.estimated) out.push("⚠ USO INTERNO: macros ESTIMADOS — não protocolar sem análise laboratorial.");
  return out;
}
function nav(){
  $("#nav").innerHTML=DATA.products.map(p=>{const m=merged(p);
    return `<button data-id="${p.id}" class="${CUR===p.id?"on":""}">${p.name}
      <span class="mono" style="color:var(--soft);display:block;font-size:9px">${m.linha}</span>
      ${m.draft?'<span class="tag draft">rascunho</span>':""}${m.estimated?'<span class="tag est">estimado</span>':""}</button>`;}).join("");
  document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>{CUR=b.dataset.id;render()});
}
function fichaHTML(m){
  const f=100/m.serving;
  const rows=NUT.map(([k,l])=>{
    const v=m.nutrition[k]??0,vd=VD[k]?Math.round(v/VD[k]*100):null;
    return `<tr><td>${l}</td><td>${br(v*f)}</td><td>${br(v)}</td><td>${vd===null?"—":vd+"%"}</td></tr>`;
  }).join("");
  const alegs=[m.claims.sugar,m.claims.sugarNote,m.claims.protein,...(m.claims.lupa||[]).map(l=>"LUPA FRONTAL: ALTO EM "+l)].filter(Boolean);
  return `<div class="ficha" id="fichaPrint">
    <h4>Ficha técnica de rotulagem — ${m.name}</h4>
    <p class="mono" style="margin-bottom:10px">${m.linha} · Porção: ${m.portionLabel} · Rendimento da receita: ${m.yield} · Gerada em ${new Date().toLocaleDateString("pt-BR")}</p>
    <p><span class="b">INGREDIENTES:</span> ${rotuloIngredientes(m)}</p>
    <p class="b">${alergicosTexto(m)}</p>
    ${advertencias(m).map(a=>`<p class="b">${a}</p>`).join("")}
    <div class="tablewrap"><table><tr><th>INFORMAÇÃO NUTRICIONAL</th><th>100 g</th><th>${m.portionLabel}</th><th>%VD*</th></tr>${rows}</table></div>
    <p style="font-size:11px">*Percentual de valores diários fornecidos pela porção com base em uma dieta de 2.000 kcal ou 8.400 kJ. Seus valores diários podem ser maiores ou menores dependendo de suas necessidades energéticas.</p>
    ${alegs.length?`<p><span class="b">Alegações:</span> ${alegs.join(" · ")}</p>`:""}
    ${m.obs?`<p><span class="b">Observações internas:</span> ${m.obs}</p>`:""}
  </div>`;
}
function render(){
  nav();
  const p=DATA.products.find(x=>x.id===CUR);if(!p){$("#sec").innerHTML="<p class='status'>Selecione um sabor.</p>";return}
  const m=merged(p),meta=(DRAFTS[p.id]||{})._meta;
  $("#sec").innerHTML=`
    <h2>${m.name}</h2>
    <p class="status">${meta?`Rascunho salvo por ${meta.by||"?"} em ${new Date(meta.at).toLocaleString("pt-BR")}`:"Sem edições pendentes — exibindo dados publicados."}</p>
    <div class="noprint">
      <h3>Porção & tabela nutricional (por porção)</h3>
      <div class="grid">
        <div><label>Porção (g)</label><input id="f_serving" type="number" step="1" value="${m.serving}"/></div>
        <div><label>Rótulo da porção</label><input id="f_portionLabel" value="${m.portionLabel}"/></div>
        ${NUT.map(([k,l])=>`<div><label>${l}</label><input id="n_${k}" type="number" step="0.1" value="${m.nutrition[k]??0}"/></div>`).join("")}
      </div>
      <h3>Lista de ingredientes do rótulo (vazio = gerada automaticamente da receita)</h3>
      <textarea id="f_ingredientesText" placeholder="${rotuloIngredientes({...m,ingredientesText:""}).replace(/"/g,"&quot;")}">${m.ingredientesText||""}</textarea>
      <h3>Alérgicos — CONTÉM (vazio = derivado da receita)</h3>
      <input id="f_alergicosText" value="${m.alergicosText||""}" placeholder="${m.allergens.join(", ")}"/>
      <h3>Observações internas (não saem no rótulo)</h3>
      <textarea id="f_obs">${m.obs||""}</textarea>
      <div class="row">
        <button class="act" id="save">Salvar rascunho</button>
        <button class="act sec" id="clear">Descartar rascunho</button>
        <button class="act" id="ai">🧠 Analisar conformidade (IA)</button>
        <button class="act sec" onclick="window.print()">Imprimir / PDF p/ protocolo</button>
      </div>
      <div class="status" id="msg"></div>
      <div id="aiout"></div>
    </div>
    <h3>Prévia da ficha (modelo de protocolo)</h3>
    ${fichaHTML(m)}`;
  $("#save").onclick=save;$("#clear").onclick=clearDraft;$("#ai").onclick=analyze;
}
function collectPatch(){
  const patch={serving:+$("#f_serving").value||undefined,portionLabel:$("#f_portionLabel").value.trim(),nutrition:{}};
  NUT.forEach(([k])=>{const v=parseFloat($("#n_"+k).value);if(Number.isFinite(v))patch.nutrition[k]=v});
  const it=$("#f_ingredientesText").value.trim();if(it)patch.ingredientesText=it;
  const al=$("#f_alergicosText").value.trim();if(al)patch.alergicosText=al;
  const ob=$("#f_obs").value.trim();if(ob)patch.obs=ob;
  return patch;
}
async function save(){
  $("#msg").textContent="Salvando…";
  const r=await fetch("/api/fichas",{method:"POST",headers:auth(),body:JSON.stringify({action:"save",id:CUR,by:NAME,patch:collectPatch()})});
  const j=await r.json().catch(()=>({}));
  if(j.ok){DRAFTS=j.drafts;render();$("#msg").textContent="Rascunho salvo ✔ (o site público só muda após aplicação no código)."}
  else $("#msg").textContent="Erro: "+(j.error||r.status);
}
async function clearDraft(){
  if(!confirm("Descartar o rascunho deste sabor?"))return;
  const r=await fetch("/api/fichas",{method:"POST",headers:auth(),body:JSON.stringify({action:"clear",id:CUR})});
  const j=await r.json().catch(()=>({}));if(j.ok){DRAFTS=j.drafts;render()}
}
async function analyze(){
  const b=$("#ai");b.disabled=true;b.textContent="Analisando… (até 1 min)";$("#aiout").innerHTML="";
  const p=DATA.products.find(x=>x.id===CUR);
  const ficha={base:p,draft:DRAFTS[p.id]||null,rotulo:{ingredientes:rotuloIngredientes(merged(p)),alergicos:alergicosTexto(merged(p)),advertencias:advertencias(merged(p))},contexto:{podeConter:DATA.podeConter,avisoPoliol:DATA.avisoPoliol}};
  try{
    const r=await fetch("/api/fichas-ai",{method:"POST",headers:auth(),body:JSON.stringify({ficha})});
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||r.status);
    const a=j.analise,ic={critico:"⛔",atencao:"⚠️",info:"ℹ️"};
    $("#aiout").innerHTML=`<div class="ai">
      <div class="mono" style="margin-bottom:8px">Parecer da IA · ${{conforme:"✅ CONFORME",conforme_com_ressalvas:"🟡 CONFORME COM RESSALVAS",nao_conforme:"⛔ NÃO CONFORME"}[a.status]||a.status}</div>
      <ul style="margin:0;padding-left:18px">${a.achados.map(x=>`<li><span class="${x.gravidade}">${ic[x.gravidade]||""} ${x.norma}</span> — ${x.descricao}<br/><em>Correção: ${x.correcao}</em></li>`).join("")||"<li>Nenhum achado.</li>"}</ul>
      <h3>Rótulo sugerido pela IA</h3>
      <p style="font-size:13px"><b>INGREDIENTES:</b> ${a.rotulo_sugerido.lista_ingredientes}</p>
      <p style="font-size:13px"><b>${a.rotulo_sugerido.alergicos}</b></p>
      ${a.rotulo_sugerido.advertencias.map(x=>`<p style="font-size:13px"><b>${x}</b></p>`).join("")}
      ${a.rotulo_sugerido.alegacoes.length?`<p style="font-size:13px"><b>Alegações:</b> ${a.rotulo_sugerido.alegacoes.join(" · ")}</p>`:""}
      <button class="act sec" style="margin-top:8px" id="aiApply">Copiar lista sugerida p/ o rascunho</button>
    </div>`;
    $("#aiApply").onclick=()=>{$("#f_ingredientesText").value=a.rotulo_sugerido.lista_ingredientes;$("#msg").textContent="Lista sugerida copiada — revise e salve o rascunho."};
  }catch(e){$("#aiout").innerHTML=`<div class="ai"><span class="critico">Erro na análise:</span> ${e.message}</div>`}
  b.disabled=false;b.textContent="🧠 Analisar conformidade (IA)";
}
$("#expjson").onclick=()=>{
  const blob=new Blob([JSON.stringify({geradoEm:new Date().toISOString(),...DATA,drafts:DRAFTS},null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="bento-fichas-tecnicas.json";a.click();
};
async function boot(){
  const r=await fetch("/api/fichas",{headers:auth(),cache:"no-store"});
  if(r.status===401)throw new Error("401");
  const j=await r.json();DRAFTS=j.drafts||{};
  if(!DATA)DATA=await (await fetch("/fichas-data.json",{cache:"no-store"})).json();
  CUR=CUR||DATA.products[0].id;
  $("#gate").style.display="none";render();
}
$("#gbtn").onclick=async()=>{
  KEY=$("#gkey").value.trim();NAME=$("#gname").value.trim()||NAME;
  localStorage.setItem("fichas:key",KEY);localStorage.setItem("fichas:nome",NAME);
  try{await boot()}catch{$("#gerr").textContent="Senha incorreta ou API indisponível."}
};
$("#gname").value=NAME;
if(KEY)boot().catch(()=>{$("#gate").style.display="flex"});
</script>
</body></html>
